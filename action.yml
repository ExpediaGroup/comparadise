name: 'comparadise'
description: 'A Github Action for using Comparadise with visual regression tests'
author: 'Dan Adajian'
inputs:
  workflow:
    description: 'The workflow to run. Supported values: "pr" (default), "merge", "manifest-generate", "manifest-compare", "manifest-merge".'
    required: false
    default: 'pr'
  visual-test-command:
    description: 'The command that runs your visual tests. Can be multiple lines! Required when workflow is pr.'
    required: false
  bucket-name:
    description: 'The S3 bucket name'
    required: true
  commit-hash:
    description: 'The commit hash. Required for pr/merge/manifest-compare workflows.'
    required: false
  diff-id:
    description: 'Alternative to commit-hash as a unique identifier for visual tests. GitHub integration will be disabled if diff-id is used.'
    required: false
  use-base-images:
    description: 'Optionally disables base images from being used'
    required: false
    default: 'true'
  screenshots-directory:
    description: 'The directory where your visual tests expect screenshots to be'
    required: false
    default: screenshots
  package-paths:
    description: >-
      Comma separated list of package paths for monorepos. For the
      manifest-generate workflow, pass the single package path for that matrix
      job; it is used as the manifest key prefix and the per-package manifest
      filename (manifests/{commit-sha}/{package-path}.json).
    required: false
  comparadise-host:
    description: 'The URL at which you are hosting Comparadise'
    required: false
  comment-details:
    description: 'Additional details you would like to leave on the Comparadise comment'
    required: false
  github-token:
    description: 'The GitHub access token'
    required: false
    default: ${{ github.token }}
  resize-width:
    description: 'Optional maximum width to resize images before upload'
    required: false
  resize-height:
    description: 'Optional maximum height to resize images before upload'
    required: false
  visual-test-command-fails-on-diff:
    description: 'Whether the visual-test-command fails if visual diffs are detected'
    required: false
    default: 'true'
  head-sha:
    description: 'Optional main HEAD SHA used by manifest-generate to only upload changed screenshots.'
    required: false
  base-ref:
    description: 'Base branch name for manifest-compare (for example, "main").'
    required: false
  pr-sha:
    description: 'PR head SHA for manifest-merge. Falls back to github.event.pull_request.head.sha.'
    required: false
  pr-number:
    description: 'PR number for manifest-merge. Falls back to github.event.pull_request.number.'
    required: false
  merge-commit-sha:
    description: 'Merge commit SHA for manifest-merge. Falls back to github.event.pull_request.merge_commit_sha.'
    required: false
  update-base-images-on-accept:
    description: 'Whether accepting visual changes in the web app should update base images in S3.'
    required: false
    default: 'true'
runs:
  using: 'node24'
  main: 'action/dist/main.js'
  post: 'action/dist/post.js'
branding:
  icon: layout
  color: green
